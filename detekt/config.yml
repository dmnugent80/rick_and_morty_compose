build:
  maxIssues: 0

config:
  validation: true

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

comments:
  active: true
  AbsentOrWrongFileLicense:
    active: false
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false
  EndOfSentenceFormat:
    active: false
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 10
    constructorThreshold: 12
    ignoreDefaultParameters: true
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInInterfaces: 20
    thresholdInObjects: 20
    thresholdInEnums: 15
  NestedBlockDepth:
    active: true
    threshold: 4
  CyclomaticComplexMethod:
    active: true
    threshold: 15

coroutines:
  active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    allowedExceptionNameRegex: '^(CancellationException)$'
  SwallowedException:
    active: true
  PrintStackTrace:
    active: true

naming:
  active: true
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - "Composable"
      - "Preview"
      - "Test"
  VariableNaming:
    active: true
  TopLevelPropertyNaming:
    active: true
  MatchingDeclarationName:
    active: true

performance:
  active: true

potential-bugs:
  active: true

style:
  active: true
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 3
  WildcardImport:
    active: true
    excludeImports:
      - "java.util.*"
      - "kotlinx.android.synthetic.*"
  UnusedImports:
    active: true
  UnusedPrivateMember:
    active: true
    ignoreAnnotated:
      - "Preview"
  RedundantVisibilityModifierRule:
    active: true
  UnnecessaryAbstractClass:
    active: true
  UseCheckOrError:
    active: true
  NewLineAtEndOfFile:
    active: true
  OptionalAbstractKeyword:
    active: true
  SafeCast:
    active: true
  ThrowsCount:
    active: true
    max: 3
